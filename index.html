<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AutoZap Start</title>
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/autozap-logo-mark.png">
    <link rel="apple-touch-icon" href="./assets/autozap-logo-mark.png">
    <style>
      html,
      body {
        min-height: 100%;
        margin: 0;
        background: #f5f9ff;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #07133f;
      }

      body {
        display: grid;
        place-items: center;
      }

      .loader {
        display: grid;
        justify-items: center;
        gap: 14px;
        padding: 24px;
        text-align: center;
      }

      .loader img {
        width: 112px;
        height: auto;
      }

      .loader strong {
        font-size: 1rem;
      }
    </style>
  </head>
  <body>
    <main class="loader" aria-live="polite">
      <img src="./assets/autozap-logo-mark.png" alt="AutoZap">
      <strong>Carregando AutoZap Start...</strong>
    </main>
    <script src="./js/config.js"></script>
    <script src="./js/router.js"></script>
  </body>
</html>
